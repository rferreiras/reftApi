<div class="loginBox" id="loginComp" ng-controller="login">
  <div class="InputPanel" style="float: left;">
    <div><i class="icon-user"></i>Login</div>
    <label for="UsuarioTxt">Usuario</label>
    <input type="text" class="UsuarioTxt" ng-model='$parent.$parent.$parent.$parent.email' />
    <label for="ClaveTxt">Clave</label>
    <input type="password" class="ClaveTxt" ng-model="$parent.$parent.$parent.$parent.password" />
    <div class="button BtLogin" ng-click="loginClick()">Login</div>
    <div class="button BtRegistro">Registrar Nueva Cuenta</div>
  </div>
  <div class="OutputPanel " style="float: right;">
    <div >{{$parent.$parent.$parent.$parent.email}}</div>
    <div class=" icon-down-open-b"></div>
  </div>
  <div class="Opciones">
    <ul>
      <li class="loginLogoutBt" ng-click="logOutClick()"><i class="icon-logout"></i>Log out
      </li>
      <li class="loginPreferenciasBt"><i class="icon-config"></i>Preferencias
      </li>
      <li class="loginVerPerfilBt"><i class="icon-user"></i>Ver Perfil
      </li>
      <li>-----------------------------------
      </li>
      <li class="loginCerrarOpcionesBt"><i class="icon-cancel"></i>Cerrar
      </li>
    </ul>
  </div>
  <div class="RegistroUsuarios">
    <script>
      lib.Os.Modulo("registro", ".RegistroUsuarios");
    </script>
  </div>

  <script>

    $(".loginLogoutBt,.loginVerPerfilBt,.loginPreferenciasBt,.loginCerrarOpcionesBt").click(function(e) {
      $(".loginBox .Opciones").toggle();
    });

    $(".loginBox .OutputPanel,.loginBox .RegistroUsuarios").hide();
    $(".loginLogoutBt").click(function(e) {
      //$(".loginBox .Opciones").toggle();
      window.location.href="#/";
      $("#nav,.tvPanel").addClass("oculto");
      lib.Os.MaskSesion = "";
      lib.Os.dataUser = "";
      $(".UserEmail,#OsShowCont,#OsShowComp").html("");
      $(".loginBox .OutputPanel,.loginBox .RegistroUsuarios").hide();
      $(".loginBox").removeClass("loged");
      $(".loginBox .InputPanel").fadeIn();
    });
    $(".loginBox .Opciones").hide();
    $(".loginBox .OutputPanel").click(function(e) {
      $(".loginBox .Opciones").toggle();
    });
